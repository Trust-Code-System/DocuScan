<script>
        // Simple drag implementation for visual effect only
        const dragElement = document.getElementById('signature-element');
        let isDragging = false;
        let startX, startY, initialX, initialY;

        dragElement.addEventListener('mousedown', dragStart);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', dragEnd);

        function dragStart(e) {
            if(e.target.closest('button') || e.target.closest('.cursor-se-resize')) return;
            isDragging = true;
            const style = window.getComputedStyle(dragElement);
            // Quick hack for absolute positioning
            initialX = e.clientX - parseInt(style.left || 0);
            initialY = e.clientY - parseInt(style.top || 0);
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();
            const currentX = e.clientX - initialX;
            const currentY = e.clientY - initialY;
            dragElement.style.transform = `translate(0, 0)`; // reset translate to use left/top simply
            dragElement.style.left = `${currentX}px`;
            dragElement.style.top = `${currentY}px`;
        }

        function dragEnd() {
            isDragging = false;
        }
    </script>
